## 欢迎使用新模板

这是一个新的文章模板。

1. 复制这个 html 文件，重命名为新文件名（例如 `post-01.html`）
2. 用文本编辑器打开，找到底部的 `<script type="text/markdown" id="markdown-source">` 区域
3. 将你的 Markdown 内容粘贴在 `---` 包裹的元数据下方
4. 保存即可

### 代码示例

        <script src="blog_data.js"></script>
    <script>
        lucide.createIcons();
        marked.setOptions({
            gfm: true,
            breaks: true
        });

        document.addEventListener('DOMContentLoaded', () => {
                const sourceHintEl = document.getElementById('post-source-hint');

                function parseFrontMatter(source) {
                    const fmRegex = /^---\s*[\r\n]+([\s\S]*?)[\r\n]+---/;
                    const match = source.match(fmRegex);

                    const meta = { title: 'Untitled Post', date: 'Thinking...', category: 'Log', tags: [] };
                    let body = source;

                    if (match) {
                        const rawMeta = match[1];
                        body = source.replace(match[0], '').trim();

                        rawMeta.split('\n').forEach((line) => {
                            const separatorIndex = line.indexOf(':');
                            if (separatorIndex < 0) {
                                return;
                            }

                            const key = line.slice(0, separatorIndex).trim();
                            let val = line.slice(separatorIndex + 1).trim();

                            if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
                                val = val.slice(1, -1);
                            }

                            if (val.startsWith('[') && val.endsWith(']')) {
                                val = val.slice(1, -1).split(',').map((s) => s.trim().replace(/^['"]|['"]$/g, '')).filter(Boolean);
                            }

                            meta[key] = val;
                        });
                    }

                    return { meta, body };
                }

                function renderPost(source) {
                    const parsed = parseFrontMatter(source);
                    const meta = parsed.meta;
                    const renderArea = document.getElementById('markdown-render-area');

                    document.getElementById('post-title').textContent = meta.title;
                    document.getElementById('post-date').textContent = meta.date;
                    document.getElementById('post-category').textContent = meta.category;

                    const protectedMath = protectMathSegments(parsed.body);
                    const rawHtml = marked.parse(protectedMath.markdown);
                    renderArea.innerHTML = restoreMathSegments(rawHtml, protectedMath.tokens);
                    typesetMath(renderArea);
                }

                function protectMathSegments(markdown) {
                    const tokens = [];
                    let normalized = markdown;

                    normalized = normalized.replace(/\$\$[\s\S]*?\$\$/g, (segment) => {
                        const token = `@@MATH_BLOCK_${tokens.length}@@`;
                        tokens.push(segment);
                        return token;
                    });

                    normalized = normalized.replace(/\$(?!\s)(?:\\.|[^$\\\n])+\$/g, (segment) => {
                        const token = `@@MATH_INLINE_${tokens.length}@@`;
                        tokens.push(segment);
                        return token;
                    });

                    return { markdown: normalized, tokens };
                }

                function restoreMathSegments(html, tokens) {
                    let restored = html;

                    tokens.forEach((segment, index) => {
                        const blockToken = `@@MATH_BLOCK_${index}@@`;
                        const inlineToken = `@@MATH_INLINE_${index}@@`;
                        restored = restored.split(blockToken).join(segment);
                        restored = restored.split(inlineToken).join(segment);
                    });

                    return restored;
                }

                function typesetMath(container) {
                    let attempts = 0;

                    function tryTypeset() {
                        if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
                            window.MathJax.typesetClear([container]);
                            window.MathJax.typesetPromise([container]).catch(() => {
                                // Keep article readable even if math rendering fails.
                            });
                            return;
                        }

                        attempts += 1;
                        if (attempts < 20) {
                            window.setTimeout(tryTypeset, 80);
                        }
                    }

                    tryTypeset();
                }

                function getInlineTemplateSource() {
                    return document.getElementById('markdown-source').textContent;
                }

                async function resolveSourceByFileName(fileName) {
                    try {
                        const response = await fetch(`notes/${fileName}`);
                        if (response.ok) {
                            sourceHintEl.textContent = `SOURCE: notes/${fileName}`;
                            return await response.text();
                        }
                    } catch (error) {
                        // Ignore and continue to fallback.
                    }

                    if (Array.isArray(window.BLOG_DATA)) {
                        const matched = window.BLOG_DATA.find((item) => item.filename === fileName);
                        if (matched && matched.content) {
                            sourceHintEl.textContent = `SOURCE: blog_data.js -> ${fileName}`;
                            return matched.content;
                        }
                    }

                    sourceHintEl.textContent = `SOURCE: inline template (missing: ${fileName})`;
                    return getInlineTemplateSource();
                }

                async function initPostPage() {
                    const params = new URLSearchParams(window.location.search);
                    const fileName = params.get('file');

                    if (!fileName) {
                        renderPost(getInlineTemplateSource());
                        return;
                    }

                    const source = await resolveSourceByFileName(fileName);
                    renderPost(source);
                }

                initPostPage();
        });
    </script>
